name: 'CodeReview CI'
description: 'Triggers an AI-powered code review for your Pull Request'
author: 'CodeSM27'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  api-url:
    description: 'The base URL of the CodeReview CI Spring Boot API backend'
    required: true
  token:
    description: 'GitHub token for fetching diffs (default: github.token)'
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Trigger CodeReview CI Webhook
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        API_URL: ${{ inputs.api-url }}
      run: |
        echo "Triggering CodeReview CI at $API_URL"
        
        # We simulate a webhook payload matching GitHub's format.
        # Alternatively, if GitHub's native webhook is used, this action isn't strictly necessary,
        # but providing a composite action allows users to trigger reviews on-demand 
        # or customize the trigger conditions via Actions rather than Org webhooks.
        
        curl -X POST "$API_URL/api/v1/webhooks/github" \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Event: pull_request" \
          -d '{
            "action": "opened",
            "pull_request": {
              "number": ${{ github.event.pull_request.number }},
              "title": "${{ github.event.pull_request.title }}",
              "diff_url": "${{ github.event.pull_request.diff_url }}",
              "state": "${{ github.event.pull_request.state }}",
              "head": {
                "sha": "${{ github.event.pull_request.head.sha }}"
              }
            },
            "repository": {
              "full_name": "${{ github.repository }}"
            }
          }'
