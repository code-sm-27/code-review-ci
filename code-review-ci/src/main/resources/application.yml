spring:
  application:
    name: code-review-ci

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codereview}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      pool-name: CodeReviewHikariPool
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://${SPRING_REDIS_HOST:localhost}:${SPRING_REDIS_PORT:6379}}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:mock_client_id}
            client-secret: ${GITHUB_CLIENT_SECRET:mock_client_secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email
              - repo

cloud:
  aws:
    region:
      static: ${AWS_REGION:us-east-1}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:mock_key}
      secret-key: ${AWS_SECRET_ACCESS_KEY:mock_secret}

app:
  jwt:
    secret: ${JWT_SECRET:supersecretkeythatisverylongandsecure32bytes}
    expiration: 86400000 # 1 day in milliseconds
  github:
    webhook:
      secret: ${GITHUB_WEBHOOK_SECRET:mock_webhook_secret}
  sqs:
    queue-name: ${SQS_QUEUE_NAME:codereview-queue}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.github.codesm27.codereview: DEBUG
    org.springframework.security: INFO